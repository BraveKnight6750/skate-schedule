name: Update Skate Schedule

on:
  schedule:
    - cron: '0 * * * *'  # runs every hour
  workflow_dispatch:      # allows manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests ics PyGithub pytz

      - name: Run PublicSkate.py
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python PublicSkate.py

      - name: Run OpenHockey.py
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python OpenHockey.py
